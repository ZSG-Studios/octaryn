name: Feedback
description: Suggest an improvement for Octaryn.
title: "[Feedback] "
labels:
  - feedback
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Design
        - UX
        - Rendering
        - Gameplay
        - Tools
        - Docs
        - Balance
        - Performance
        - Engine architecture
        - Other
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why it matters
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes or alternatives

