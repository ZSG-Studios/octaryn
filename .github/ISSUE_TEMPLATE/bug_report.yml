name: Bug report
description: Report an Octaryn engine, client, server, basegame, or tooling bug.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Keep reports concrete. Include enough detail for someone else to reproduce the problem.
  - type: input
    id: build
    attributes:
      label: Build or commit
      description: Which build, branch, or commit did you test?
      placeholder: "main @ commit, local debug build, release tag"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rendering
        - Client
        - Server
        - Networking
        - Build
        - Tooling
        - Gameplay
        - Performance
        - Assets
        - Basegame
        - Shared API
        - Other
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, captures, or notes
      description: Attach logs, screenshots, RenderDoc captures, Tracy captures, or focused details if available.

